name: 데이터 자동 갱신

on:
  schedule:
    - cron: "0 23 * * *"   # 매일 KST 08:00 (UTC 23:00)
  workflow_dispatch:        # Actions 탭에서 수동 실행 버튼

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 의존성 설치
        run: pip install -r requirements.txt

      - name: 데이터 수집
        env:
          KOSIS_API_KEY: ${{ secrets.KOSIS_API_KEY }}
          ECOS_API_KEY: ${{ secrets.ECOS_API_KEY }}
          REB_API_KEY: ${{ secrets.REB_API_KEY }}
        run: python fetch.py

      - name: 변경사항 커밋
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data
          git diff --cached --quiet || git commit -m "data: 자동 갱신 $(date -u +'%Y-%m-%d')"
          git push
