<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Macrobox</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif; background: #f4f6f9; color: #222; }
  header { background: #1a2b4a; color: #fff; padding: 14px 24px; display: flex; align-items: baseline; gap: 16px; }
  header h1 { font-size: 18px; }
  header .updated { font-size: 12px; color: #9fb3d1; }
  .layout { display: flex; min-height: calc(100vh - 50px); }
  nav { width: 230px; background: #fff; border-right: 1px solid #e0e4ea; padding: 12px 0; flex-shrink: 0; }
  nav button { display: block; width: 100%; text-align: left; padding: 10px 18px; border: 0; background: none;
               cursor: pointer; font-size: 13.5px; color: #333; }
  nav button:hover { background: #eef2f8; }
  nav button.active { background: #e3ecfb; color: #1a4fa0; font-weight: 700; border-right: 3px solid #1a4fa0; }
  main { flex: 1; padding: 20px 24px; min-width: 0; }
  .toolbar { display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; align-items: center;
             position: sticky; top: 0; z-index: 30; background: #f4f6f9;
             padding: 10px 0; box-shadow: 0 4px 6px -4px rgba(0,0,0,.12); }
  .toolbar .mode button { padding: 6px 14px; font-size: 13px; border: 1px solid #c8d0dc; background: #fff; cursor: pointer; }
  .toolbar .mode button:first-child { border-radius: 4px 0 0 4px; }
  .toolbar .mode button:last-child { border-radius: 0 4px 4px 0; }
  .toolbar .mode button.active { background: #1a4fa0; color: #fff; border-color: #1a4fa0; }
  .toolbar select { padding: 6px; font-size: 13px; border: 1px solid #c8d0dc; border-radius: 4px; }
  .card { background: #fff; border: 1px solid #e0e4ea; border-radius: 8px; padding: 18px; }
  .card h2 { font-size: 15px; margin-bottom: 4px; }
  .card .meta { font-size: 12px; color: #888; margin-bottom: 12px; }
  #chartWrap { position: relative; height: 460px; }
  .series-picker { margin-top: 14px; display: flex; flex-wrap: wrap; gap: 6px 14px; font-size: 12.5px; }
  .series-picker label { cursor: pointer; user-select: none; }
  .empty { color: #888; padding: 60px; text-align: center; }
  #tableWrap { overflow-x: auto; max-height: 560px; overflow-y: auto; }
  table.data { border-collapse: collapse; font-size: 12.5px; white-space: nowrap; width: 100%; }
  table.data th, table.data td { padding: 5px 10px; text-align: right; border-bottom: 1px solid #eef1f5; }
  table.data thead th { background: #f0f3f8; position: sticky; top: 0; font-weight: 700; }
  table.data th:first-child, table.data td:first-child {
    text-align: left; position: sticky; left: 0; background: #fff; border-right: 1px solid #e0e4ea; }
  table.data thead th:first-child { background: #f0f3f8; z-index: 2; }
  table.data tbody tr:hover td { background: #f5f8fd; }
  table.data tbody tr:hover td:first-child { background: #f5f8fd; }
  table.data tbody tr:first-child { font-weight: 700; }
  td.neg { color: #c0392b; }
  /* GDP 표: 세로선 + 가로선 + 구분선 (큰 구분 실선, 세부 내역 점선) + 들여쓰기 */
  table.data.vlines th, table.data.vlines td {
    border-right: 1px solid #e8ecf1;
    border-bottom: 1px solid #dbe2ea;   /* 모든 행 가로선 (기본보다 선명하게) */
  }
  table.data tr.sep-solid td { border-bottom: 2px solid #9aa7b8; }   /* 실선 */
  table.data tr.sep-dot td { border-bottom: 1px dotted #b0bac7; }    /* 점선 */
  table.data tr.lv1 td:first-child { padding-left: 24px; }
  table.data tr.lv2 td:first-child { padding-left: 40px; }
  table.data tr.hl td { background: #fff3c4; }               /* 강조 행 */
  table.data tbody tr.hl:hover td { background: #ffeda8; }
  .rowbtn { visibility: hidden; cursor: pointer; font-size: 11px; color: #97a3b4; margin-right: 5px; }
  table.data tbody tr:hover .rowbtn { visibility: visible; }
  .rowbtn:hover { color: #1a4fa0; }
  /* 셀 호버 시 세로(열) 강조 + 클릭 시 십자 강조 */
  table.data td.colhov, table.data th.colhov { background: #eef2f8; }
  table.data tr.xrow td { background: #e3ecfb; }
  table.data td.xcol, table.data th.xcol { background: #e3ecfb; }
  table.data td.xsel { background: #c8dcfa; font-weight: 700; }
  table.data td.xrange { background: #d5e4fb; }   /* Shift 범위 선택 */
  .block-title { margin: 16px 0 6px; font-size: 14px; font-weight: 700; color: #1a2b4a; }
  #multiWrap .block-title:first-child, #comboWrap .block-title:first-child { margin-top: 0; }
  .tscroll { overflow-x: auto; margin-bottom: 4px; }
  .cchart { position: relative; height: 300px; margin-bottom: 10px; }
</style>
</head>
<body>
<header>
  <h1>Macrobox</h1>
  <span class="updated" id="updatedAt"></span>
</header>
<div class="layout">
  <nav id="nav"></nav>
  <main>
    <div class="toolbar">
      <div class="mode" id="viewButtons">
        <button data-view="multi" id="multiBtn" style="display:none">종합</button>
        <button data-view="table">표</button>
        <button data-view="chart" class="active">차트</button>
      </div>
      <div class="mode" id="modeButtons">
        <button data-mode="level" class="active">원자료</button>
        <button data-mode="pop">전기비 %</button>
        <button data-mode="yoy">전년동기비 %</button>
        <button data-mode="cqoq" class="gdp-only" style="display:none">기여도 QoQ</button>
        <button data-mode="cyoy" class="gdp-only" style="display:none">기여도 YoY</button>
        <button data-mode="share" class="gdp-only" style="display:none">비중</button>
      </div>
      <span style="font-size:13px;color:#555">기간</span>
      <select id="startSel"></select>
      <span style="font-size:12px;color:#888">~</span>
      <select id="endSel"></select>
      <span id="scrollBtns" style="display:none">
        <button id="scrollL" title="반 화면 왼쪽으로" style="padding:6px 10px;font-size:13px;
          border:1px solid #c8d0dc;background:#fff;cursor:pointer;border-radius:4px 0 0 4px">◀</button><button
          id="scrollR" title="반 화면 오른쪽으로" style="padding:6px 10px;font-size:13px;
          border:1px solid #c8d0dc;border-left:0;background:#fff;cursor:pointer;border-radius:0 4px 4px 0">▶</button>
      </span>
      <button id="restoreBtn" style="display:none;padding:6px 14px;font-size:13px;
        border:1px solid #c8d0dc;background:#fff;cursor:pointer;border-radius:4px"></button>
      <button id="exportBtn" style="margin-left:auto;padding:6px 14px;font-size:13px;
        border:1px solid #c8d0dc;background:#fff;cursor:pointer;border-radius:4px">엑셀 다운로드</button>
    </div>
    <div id="compareBar" style="display:none;margin-bottom:12px;gap:8px;flex-wrap:wrap;align-items:center">
      <select id="cmpInd" style="padding:6px;font-size:13px;border:1px solid #c8d0dc;border-radius:4px"></select>
      <select id="cmpSeries" style="padding:6px;font-size:13px;border:1px solid #c8d0dc;border-radius:4px;max-width:280px"></select>
      <button id="cmpAdd" style="padding:6px 14px;font-size:13px;border:1px solid #1a4fa0;
        background:#1a4fa0;color:#fff;cursor:pointer;border-radius:4px">차트에 추가</button>
      <span id="cmpChips" style="display:flex;gap:6px;flex-wrap:wrap"></span>
    </div>
    <div class="card">
      <h2 id="title">불러오는 중…</h2>
      <div class="meta" id="metaLine"></div>
      <div id="chartWrap"><canvas id="chart"></canvas></div>
      <div id="tableWrap" style="display:none"></div>
      <div id="multiWrap" style="display:none"></div>
      <div id="comboWrap" style="display:none"></div>
      <div class="series-picker" id="seriesPicker"></div>
    </div>
  </main>
</div>

<script>
const PALETTE = ['#1a4fa0','#d9534f','#2e8b57','#e8930c','#7b52ab','#17879c',
                 '#b0486e','#5c6b7a','#8aa832','#c26b1d','#4666d1','#9e3fbf'];
let catalog = [], current = null, chart = null;
let mode = 'level', view = 'chart';
let periodDates = [], startD = null, endD = null;   // 기간 설정
let visible = new Set();   // 표시 중인 시리즈명 (차트 전용, 표는 전체 항목 표시)

const inRange = d => (!startD || d >= startD) && (!endD || d <= endD);
const lagYoY = () =>
  ({ Q: 4, A: 1, W: 52, M: 12 }[current.freq] || 12);
const stripCode = n => n.replace(/ \[[^\]]*\]$/, '');
// 잔차 성격이라 증감률(%)이 무의미한 항목 (0 근처 → 증감률 폭발)
const NO_GROWTH = new Set(['재고증감 및 귀중품 순취득', '통계상 불일치', '통계상불일치']);

// 항목 숨기기/강조 (지표별로 브라우저에 저장)
let hiddenRows = new Set(), hlRows = new Set();
function loadRowPrefs() {
  try {
    hiddenRows = new Set(JSON.parse(localStorage.getItem('hide_' + current.id) || '[]'));
    hlRows = new Set(JSON.parse(localStorage.getItem('hl_' + current.id) || '[]'));
  } catch (e) { hiddenRows = new Set(); hlRows = new Set(); }
}
function saveRowPrefs() {
  try {
    localStorage.setItem('hide_' + current.id, JSON.stringify([...hiddenRows]));
    localStorage.setItem('hl_' + current.id, JSON.stringify([...hlRows]));
  } catch (e) { /* 사파리 프라이빗 모드 등 */ }
}
function nameCell(name) {
  return `<td><span class="rowbtn" data-name="${name}" data-act="hide" title="이 항목 숨기기">✕</span>`
    + `<span class="rowbtn" data-name="${name}" data-act="hl" title="강조">★</span>${name}</td>`;
}
function updateRestoreBtn() {
  const b = document.getElementById('restoreBtn');
  const show = hiddenRows.size > 0 && (view === 'table' || view === 'multi');
  b.style.display = show ? '' : 'none';
  if (show) b.textContent = `숨긴 항목 ${hiddenRows.size}개 복원`;
}

// file://(더블클릭)에서도 동작하도록 fetch 대신 <script> 태그로 데이터 로드
function loadScript(path) {
  return new Promise((resolve, reject) => {
    const s = document.createElement('script');
    s.src = path + (location.protocol === 'file:' ? '' : '?t=' + Date.now());
    s.onload = () => { s.remove(); resolve(); };
    s.onerror = () => { s.remove(); reject(new Error(path + ' 로드 실패')); };
    document.head.appendChild(s);
  });
}
async function loadCatalog() {
  await loadScript('data/index.js');
  return window.__MACRO_INDEX__ || [];
}
async function loadIndicator(id) {
  await loadScript('data/' + id + '.js');
  return (window.__MACRO__ || {})[id];
}

function popChange(data, lag) {   // 전기비/전년동기비 (%)
  const out = [];
  for (let i = lag; i < data.length; i++) {
    const prev = data[i - lag].v;
    if (prev) out.push({ d: data[i].d, v: (data[i].v / prev - 1) * 100 });
  }
  return out;
}

// 시리즈 하나를 현재 모드에 맞게 변환
// level/pop/yoy: 자체 데이터만 사용 · cqoq/cyoy/share: GDP 총계(첫 시리즈) 기준
function transformSeries(s) {
  if (mode === 'level') return s.data;
  if ((mode === 'pop' || mode === 'yoy') && NO_GROWTH.has(stripCode(s.name))) return [];
  if (mode === 'pop') return popChange(s.data, 1);
  if (mode === 'yoy') return popChange(s.data, lagYoY());

  const total = current.series[0];
  const gmap = new Map(total.data.map(p => [p.d, p.v]));
  const dates = total.data.map(p => p.d);
  const sign = s.name.startsWith('(공제)') ? -1 : 1;
  const m = new Map(s.data.map(p => [p.d, p.v]));
  const out = [];

  if (mode === 'share') {                     // GDP 대비 비중 (%)
    s.data.forEach(p => {
      const g = gmap.get(p.d);
      if (g) out.push({ d: p.d, v: p.v / g * 100 * sign });
    });
    return out;
  }
  // 기여도 (%p) = (X_t − X_{t−lag}) / GDP_{t−lag} × 100, 공제 항목 부호 반전
  const lag = mode === 'cqoq' ? 1 : lagYoY();
  dates.forEach((d, i) => {
    if (i < lag) return;
    const a = m.get(d), b = m.get(dates[i - lag]), g = gmap.get(dates[i - lag]);
    if (a != null && b != null && g) out.push({ d, v: (a - b) / g * 100 * sign });
  });
  return out;
}

function render() {
  const picker = document.getElementById('seriesPicker');
  picker.innerHTML = '';
  // 전체 선택/해제 버튼
  const allBtn = document.createElement('button');
  allBtn.textContent = visible.size === current.series.length ? '전체 해제' : '전체 선택';
  allBtn.style.cssText = 'font-size:12px;padding:3px 10px;border:1px solid #c8d0dc;'
    + 'background:#fff;cursor:pointer;border-radius:4px';
  allBtn.onclick = () => {
    visible = visible.size === current.series.length
      ? new Set() : new Set(current.series.map(s => s.name));
    render();
  };
  picker.appendChild(allBtn);
  current.series.forEach((s, i) => {
    const id = 'sp' + i;
    const label = document.createElement('label');
    label.innerHTML = `<input type="checkbox" id="${id}" ${visible.has(s.name) ? 'checked' : ''}>
      <span style="color:${PALETTE[i % PALETTE.length]}">■</span> ${s.name}`;
    label.querySelector('input').onchange = e => {
      e.target.checked ? visible.add(s.name) : visible.delete(s.name);
      refresh();
    };
    picker.appendChild(label);
  });
  refresh();
}

// GDP 항목 계층: 0 = 큰 구분(실선), 1 = 하위(점선), 2 = 세부(옅은 점선)
const GDP_LEVELS = {
  '국내총생산에 대한 지출': 0,
  '최종소비지출': 0,
  '민간': 1, '가계': 2, '가계에 봉사하는 비영리단체': 2, '정부': 1,
  '총자본형성': 0,
  '총고정자본형성': 1, '건설투자': 2, '설비투자': 2, '지식재산생산물투자': 2,
  '총고정자본형성(민간)': 1, '총고정자본형성(정부)': 1,
  '재고증감 및 귀중품 순취득': 1,
  '재화와 서비스의 수출': 0, '(재화)F.O.B. 기준': 1, '(서비스)': 1,
  '(공제)재화와 서비스의 수입': 0,
  '통계상 불일치': 0,
};
// 행 사이 구분선: 위 또는 아래가 큰 구분(lv0)이면 진한 실선, 세부 내역 사이는 점선
function gdpRowAttr(names, i, extra = '') {
  const lv = GDP_LEVELS[stripCode(names[i])];
  if (lv === undefined) return extra ? ` class="${extra}"` : '';
  const nxt = i + 1 < names.length ? GDP_LEVELS[stripCode(names[i + 1])] : 0;
  const sep = (lv === 0 || nxt === 0 || nxt === undefined) ? 'sep-solid' : 'sep-dot';
  return ` class="lv${lv} ${sep}${extra ? ' ' + extra : ''}"`;
}
const isGdp = () => current.series.length > 0 && current.series[0].name.includes('국내총생산');

const MODE_LABELS = {
  pop: '전기비 %', yoy: '전년동기비 %',
  cqoq: '성장 기여도 QoQ (%p)', cyoy: '성장 기여도 YoY (%p)', share: 'GDP 대비 비중 %',
};
function updateMeta() {
  if (view === 'compare') {
    document.getElementById('metaLine').textContent =
      mode === 'level'
        ? '원자료 — 지표별 단위가 달라 축 스케일에 주의 (전기비/전년동기비 권장)'
        : `단위: ${MODE_LABELS[mode]}`;
    return;
  }
  const freqLabel = { Q: '분기', M: '월', A: '연간', W: '주간' }[current.freq] || current.freq;
  if (view === 'multi' || view === 'combo') {   // 블록마다 단위가 있으므로 생략
    document.getElementById('metaLine').textContent =
      `주기: ${freqLabel} · 갱신: ${current.updated_at}`;
    return;
  }
  const unitLabel = mode === 'level' ? current.unit : MODE_LABELS[mode];
  document.getElementById('metaLine').textContent =
    `단위: ${unitLabel} · 주기: ${freqLabel} · 갱신: ${current.updated_at}`;
}

function refresh() {
  updateMeta();
  const isCmp = view === 'compare', isCombo = view === 'combo';
  document.getElementById('chartWrap').style.display =
    (view === 'chart' || isCmp) ? '' : 'none';
  document.getElementById('seriesPicker').style.display = view === 'chart' ? '' : 'none';
  document.getElementById('tableWrap').style.display = view === 'table' ? '' : 'none';
  document.getElementById('multiWrap').style.display = view === 'multi' ? '' : 'none';
  document.getElementById('comboWrap').style.display = isCombo ? '' : 'none';
  document.getElementById('modeButtons').style.display =
    (view === 'multi' || isCombo) ? 'none' : '';
  document.getElementById('viewButtons').style.display = (isCmp || isCombo) ? 'none' : '';
  document.getElementById('compareBar').style.display = isCmp ? 'flex' : 'none';
  document.getElementById('scrollBtns').style.display =
    (view === 'table' || view === 'multi' || isCombo) ? '' : 'none';
  updateRestoreBtn();
  if (isCombo) renderCombo();
  else if (isCmp) drawCompare();
  else if (view === 'chart') draw();
  else if (view === 'table') renderTable();
  else renderMulti();
}

function dateLabel(d) {
  const [y, m, dd] = d.split('-');
  const yy = "'" + y.slice(2);
  if (view === 'compare' || !current) return `${yy}.${m}`;
  if (current.freq === 'A') return yy;
  if (current.freq === 'W') return `${yy}.${m}.${dd}`;
  return current.freq === 'Q' ? `${yy}.${Math.ceil(+m / 3)}Q` : `${yy}.${m}`;
}

// GDP 종합: QoQ·YoY·기여도(QoQ/YoY)·비중을 블록으로 한꺼번에 표시
// 기여도 = (X_t − X_{t−lag}) / GDP_{t−lag} × 100  (전기 비중 방식, 공제 항목은 부호 반전)
function renderMulti() {
  const total = current.series[0];             // series_first 로 GDP 총계가 첫 번째
  const gmap = new Map(total.data.map(p => [p.d, p.v]));
  const dates = total.data.map(p => p.d);
  const idx = new Map(dates.map((d, i) => [d, i]));
  const items = current.series.filter(s =>
    !s.name.includes('[') && !hiddenRows.has(s.name));  // 중복분리 하위항목·숨긴 항목 제외
  const lagY = lagYoY();
  const cols = dates.filter(inRange);
  const prevD = (d, lag) => { const i = idx.get(d); return i >= lag ? dates[i - lag] : null; };

  const metrics = [
    { title: '성장률 — 전기비 (QoQ, %)', dec: 1, growth: true,
      fn: (m, d) => { const p = prevD(d, 1), a = m.get(d), b = p && m.get(p);
        return a != null && b ? (a / b - 1) * 100 : null; } },
    { title: '성장률 — 전년동기비 (YoY, %)', dec: 1, growth: true,
      fn: (m, d) => { const p = prevD(d, lagY), a = m.get(d), b = p && m.get(p);
        return a != null && b ? (a / b - 1) * 100 : null; } },
    { title: '성장 기여도 — 전기비 (QoQ, %p)', dec: 2,
      fn: (m, d, ded) => { const p = prevD(d, 1); if (!p) return null;
        const a = m.get(d), b = m.get(p), g = gmap.get(p);
        return a != null && b != null && g ? (a - b) / g * 100 * (ded ? -1 : 1) : null; } },
    { title: '성장 기여도 — 전년동기비 (YoY, %p)', dec: 2,
      fn: (m, d, ded) => { const p = prevD(d, lagY); if (!p) return null;
        const a = m.get(d), b = m.get(p), g = gmap.get(p);
        return a != null && b != null && g ? (a - b) / g * 100 * (ded ? -1 : 1) : null; } },
    { title: 'GDP 대비 비중 (%)', dec: 1,
      fn: (m, d, ded) => { const a = m.get(d), g = gmap.get(d);
        return a != null && g ? a / g * 100 * (ded ? -1 : 1) : null; } },
  ];

  // 연간 지표는 전기비 = 전년비이므로 QoQ 블록 생략
  const shown = current.freq === 'A'
    ? metrics.filter(met => !met.title.includes('전기비')) : metrics;
  let out = '';
  shown.forEach(met => {
    let html = `<div class="block-title">${met.title}</div><div class="tscroll">`
      + '<table class="data vlines"><thead><tr><th>항목</th>'
      + cols.map(d => `<th>${dateLabel(d)}</th>`).join('') + '</tr></thead><tbody>';
    const itemNames = items.map(s => s.name);
    items.forEach((s, si) => {
      const m = new Map(s.data.map(p => [p.d, p.v]));
      const ded = s.name.startsWith('(공제)');
      const nog = met.growth && NO_GROWTH.has(stripCode(s.name));   // 잔차 항목 증감률 표시 안 함
      const hl = hlRows.has(s.name) ? 'hl' : '';
      html += `<tr${gdpRowAttr(itemNames, si, hl)}>${nameCell(s.name)}` + cols.map(d => {
        const v = nog ? null : met.fn(m, d, ded);
        const txt = v == null ? ''
          : v.toLocaleString('ko-KR', { minimumFractionDigits: met.dec, maximumFractionDigits: met.dec });
        return `<td${v != null && v < 0 ? ' class="neg"' : ''}>${txt}</td>`;
      }).join('') + '</tr>';
    });
    out += html + '</tbody></table></div>';
  });
  document.getElementById('multiWrap').innerHTML = out;
  document.querySelectorAll('#multiWrap .tscroll').forEach(w => { w.scrollLeft = w.scrollWidth; });
}

// 엑셀처럼 항목(행) × 기간(열) 수치 표
function renderTable() {
  const rows = current.series
    .filter(s => !hiddenRows.has(s.name))
    .map(s => ({
      name: s.name,
      map: new Map(transformSeries(s).map(p => [p.d, p.v])),
    }));
  const dateSet = new Set();
  rows.forEach(r => r.map.forEach((v, d) => dateSet.add(d)));
  const dates = [...dateSet].sort().filter(inRange);

  const fmt = v => v == null ? ''
    : mode === 'level'
      ? v.toLocaleString('ko-KR', { maximumFractionDigits: 1 })
      : v.toLocaleString('ko-KR', { minimumFractionDigits: 1, maximumFractionDigits: 1 });

  const cls = isGdp() ? ' vlines' : '';
  const rowNames = rows.map(r => r.name);
  let html = `<table class="data${cls}"><thead><tr><th>항목</th>`
    + dates.map(d => `<th>${dateLabel(d)}</th>`).join('') + '</tr></thead><tbody>';
  rows.forEach((r, ri) => {
    const hl = hlRows.has(r.name) ? 'hl' : '';
    const attr = isGdp() ? gdpRowAttr(rowNames, ri, hl) : (hl ? ` class="${hl}"` : '');
    html += `<tr${attr}>${nameCell(r.name)}` + dates.map(d => {
      const v = r.map.get(d);
      return `<td${v != null && v < 0 ? ' class="neg"' : ''}>${fmt(v)}</td>`;
    }).join('') + '</tr>';
  });
  document.getElementById('tableWrap').innerHTML = html + '</tbody></table>';
  // 최신 기간이 보이도록 오른쪽 끝으로 스크롤
  const wrap = document.getElementById('tableWrap');
  wrap.scrollLeft = wrap.scrollWidth;
}

// ── 지표 비교 (여러 지표의 시리즈를 한 차트에) ─────────────────
let compareList = [];   // {indId, indName, sName, freq, data}

function transformData(data, freq) {
  if (mode === 'level' || !MODE_LABELS[mode]) return data;
  if (mode === 'pop') return popChange(data, 1);
  return popChange(data, { Q: 4, A: 1, W: 52, M: 12 }[freq] || 12);   // yoy
}

function drawCompare() {
  const labelSet = new Set();
  const datasets = compareList.map((c, i) => {
    const data = transformData(c.data, c.freq).filter(p => inRange(p.d));
    data.forEach(p => labelSet.add(p.d));
    return {
      label: `[${c.indName}] ${c.sName}`,
      data: data.map(p => ({ x: p.d, y: p.v })),
      borderColor: PALETTE[i % PALETTE.length],
      backgroundColor: PALETTE[i % PALETTE.length],
      borderWidth: 2, pointRadius: 0, pointHitRadius: 8, tension: 0.15,
      spanGaps: true,
    };
  });
  const labels = [...labelSet].sort();
  if (chart) chart.destroy();
  chart = new Chart(document.getElementById('chart'), {
    type: 'line',
    data: { labels, datasets },
    options: {
      responsive: true, maintainAspectRatio: false, parsing: { xAxisKey: 'x', yAxisKey: 'y' },
      interaction: { mode: 'index', intersect: false },
      plugins: { legend: { display: true, position: 'bottom', labels: { font: { size: 11 } } } },
      scales: {
        x: { ticks: { maxTicksLimit: 12, font: { size: 11 },
             callback: function (v) { return dateLabel(this.getLabelForValue(v)); } } },
        y: { ticks: { font: { size: 11 }, callback: v => v.toLocaleString('ko-KR') } },
      },
    },
  });
}

function renderChips() {
  const box = document.getElementById('cmpChips');
  box.innerHTML = '';
  compareList.forEach((c, i) => {
    const chip = document.createElement('span');
    chip.style.cssText = 'font-size:12px;padding:3px 8px;border:1px solid #c8d0dc;'
      + `border-radius:12px;background:#fff;color:${PALETTE[i % PALETTE.length]}`;
    chip.innerHTML = `${c.sName} <b style="cursor:pointer">×</b>`;
    chip.querySelector('b').onclick = () => {
      compareList.splice(i, 1);
      renderChips(); updateComparePeriods(); refresh();
    };

function updateComparePeriods() {
  const ds = new Set();
  compareList.forEach(c => c.data.forEach(p => ds.add(p.d)));
  periodDates = [...ds].sort();
  if (!periodDates.length) return;
  const opts = periodDates.map(d => `<option value="${d}">${dateLabel(d)}</option>`).join('');
  const s = document.getElementById('startSel'), e = document.getElementById('endSel');
  s.innerHTML = opts; e.innerHTML = opts;
  startD = periodDates[Math.max(0, periodDates.length - 60)];
  endD = periodDates[periodDates.length - 1];
  s.value = startD; e.value = endD;
}

async function fillCmpSeries() {

async function addCompare() {
  const indId = document.getElementById('cmpInd').value;

  compareList.push({ indId, indName: ind.name, sName: s.name, freq: ind.freq, data: s.data });

}

// ── 주간 아파트 매매&전세 동향 (매매·전세·수급 종합) ──────────
const APT_COMBO = {
  id: 'apt_weekly',
  name: '주간 아파트 매매&전세 동향',
  ids: ['kr_apt_sale_idx', 'kr_apt_jeonse_idx', 'kr_apt_sale_demand'],
};
let comboData = null;
let comboCharts = [];

const wow = s => popChange(s.data, 1).filter(p => inRange(p.d));   // 주간변동률
const lvl = s => s.data.filter(p => inRange(p.d));                 // 원지수
const cum = s => {                                                 // 누적변동률 (기간 시작=0)
  const data = s.data.filter(p => inRange(p.d));
  if (!data.length) return [];
  const base = data[0].v;
  return base ? data.map(p => ({ d: p.d, v: (p.v / base - 1) * 100 })) : [];
};
function findSer(ind, kw) {
  return ind.series.find(x => x.name === kw)
    || ind.series.find(x => x.name.includes(kw)) || null;
}

// ── 엑셀 다운로드 ─────────────────────────────────────────────
function sheetFromMode(md) {
  const saved = mode; mode = md;
  const rows = current.series
    .filter(s => !hiddenRows.has(s.name))
    .map(s => ({
      name: s.name, map: new Map(transformSeries(s).map(p => [p.d, p.v])),
    }));
  mode = saved;
  const dateSet = new Set();
  rows.forEach(r => r.map.forEach((v, d) => dateSet.add(d)));
  const dates = [...dateSet].sort().filter(inRange);
  const aoa = [['항목', ...dates.map(dateLabel)]];
  rows.forEach(r => aoa.push([r.name, ...dates.map(d => r.map.get(d) ?? null)]));
  return aoa;
}

function exportExcel() {
  if (typeof XLSX === 'undefined') { alert('엑셀 라이브러리 로드 실패 (인터넷 연결 확인)'); return; }
  const wb = XLSX.utils.book_new();
  const today = new Date().toISOString().slice(0, 10);
  if (view === 'compare') {
    if (!compareList.length) { alert('추가된 시리즈가 없습니다.'); return; }
    const ds = new Set();
    compareList.forEach(c => transformData(c.data, c.freq).forEach(p => ds.add(p.d)));
    const dates = [...ds].sort().filter(inRange);
    const aoa = [['시리즈', ...dates.map(dateLabel)]];
    compareList.forEach(c => {
      const m = new Map(transformData(c.data, c.freq).map(p => [p.d, p.v]));
      aoa.push([`[${c.indName}] ${c.sName}`, ...dates.map(d => m.get(d) ?? null)]);
    });
    XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(aoa), '지표비교');
    XLSX.writeFile(wb, `compare_${today}.xlsx`);
    return;
  }
  if (view === 'combo') {
    if (!comboData) { alert('데이터가 없습니다.'); return; }
    const { sale, jeonse, demand } = comboData;
    [['매매_주간변동률', sale, wow], ['전세_주간변동률', jeonse, wow],
     ['매매수급지수', demand, lvl]].forEach(([nm, ind, fn]) => {
      const dates = [...new Set(ind.series.flatMap(s => fn(s).map(p => p.d)))].sort();
      const aoa = [['지역', ...dates.map(dateLabel)]];
      ind.series.forEach(s => {
        const m = new Map(fn(s).map(p => [p.d, p.v]));
        aoa.push([s.name, ...dates.map(d => m.get(d) ?? null)]);
      });
      XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(aoa), nm);
    });
    XLSX.writeFile(wb, `apt_weekly_${today}.xlsx`);
    return;
  }
  if (view === 'multi') {
    [['원자료', 'level'], ['QoQ', 'pop'], ['YoY', 'yoy'],
     ['기여도QoQ', 'cqoq'], ['기여도YoY', 'cyoy'], ['비중', 'share']].forEach(([nm, md]) => {
      XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(sheetFromMode(md)), nm);
    });
  } else {
    const nm = mode === 'level' ? '원자료'
      : { pop: 'QoQ', yoy: 'YoY', cqoq: '기여도QoQ', cyoy: '기여도YoY', share: '비중' }[mode];
    XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(sheetFromMode(mode)), nm);
  }
  XLSX.writeFile(wb, `${current.id}_${today}.xlsx`);
}

async function select(id) {
  if (view === 'compare' || view === 'combo') view = 'chart';
  current = await loadIndicator(id);
  document.getElementById('title').textContent = current.name;
  document.getElementById('updatedAt').textContent = '데이터 갱신: ' + current.updated_at;
  document.querySelectorAll('nav button').forEach(b =>
    b.classList.toggle('active', b.dataset.id === id));
  // 종합·기여도·비중은 총계 시리즈가 첫 번째인 지표(GDP)에서만 노출
  const hasTotal = current.series.length > 0 && current.series[0].name.includes('국내총생산');
  document.getElementById('multiBtn').style.display = hasTotal ? '' : 'none';
  document.querySelectorAll('#modeButtons .gdp-only').forEach(b =>
    b.style.display = hasTotal ? '' : 'none');
  // GDP 지표는 종합 보기를 기본으로, 그 외 지표는 종합이면 차트로 전환
  view = hasTotal ? 'multi' : (view === 'multi' ? 'chart' : view);
  document.querySelectorAll('#viewButtons button').forEach(b =>
    b.classList.toggle('active', b.dataset.view === view));
  if (!hasTotal && ['cqoq', 'cyoy', 'share'].includes(mode)) {
    mode = 'level';
    document.querySelectorAll('#modeButtons button').forEach(b =>
      b.classList.toggle('active', b.dataset.mode === mode));
  }
  // 기간 선택 옵션 구성 (기본: 최근 40기간 ~ 최신)
  const ds = new Set();
  current.series.forEach(s => s.data.forEach(p => ds.add(p.d)));
  periodDates = [...ds].sort();
  const opts = periodDates.map(d => `<option value="${d}">${dateLabel(d)}</option>`).join('');
  const startSel = document.getElementById('startSel'), endSel = document.getElementById('endSel');
  startSel.innerHTML = opts; endSel.innerHTML = opts;
  startD = periodDates[Math.max(0, periodDates.length - 40)];
  endD = periodDates[periodDates.length - 1];
  startSel.value = startD; endSel.value = endD;
  // 기본으로 첫 3개 시리즈 표시
  visible = new Set(current.series.slice(0, 3).map(s => s.name));
  loadRowPrefs();   // 이 지표의 숨김/강조 설정 복원
  render();
}

document.getElementById('viewButtons').addEventListener('click', e => {
  if (!e.target.dataset.view) return;
  view = e.target.dataset.view;
  document.querySelectorAll('#viewButtons button').forEach(b =>
    b.classList.toggle('active', b.dataset.view === view));
  refresh();
});
// 항목 숨기기(✕)·강조(★) 버튼 (표·종합 공통, 이벤트 위임)
['tableWrap', 'multiWrap'].forEach(id => {
  document.getElementById(id).addEventListener('click', e => {
    const t = e.target;
    if (!t.classList || !t.classList.contains('rowbtn')) return;
    const name = t.dataset.name;
    if (t.dataset.act === 'hide') hiddenRows.add(name);
    else hlRows.has(name) ? hlRows.delete(name) : hlRows.add(name);
    saveRowPrefs();
    refresh();
  });
});
// 표 셀 호버: 세로(열) 강조 · 클릭: 십자 강조
// Ctrl+클릭: 십자 추가/제거 · Shift+클릭: 마지막 클릭 셀부터 범위 강조
const xySel = { cells: new Set(), anchor: null };
function applyXY() {
  document.querySelectorAll('.xsel, .xcol').forEach(c => c.classList.remove('xsel', 'xcol'));
  document.querySelectorAll('.xrow').forEach(r => r.classList.remove('xrow'));
  xySel.cells.forEach(td => {
    if (!td.isConnected) { xySel.cells.delete(td); return; }
    const tbl = td.closest('table');
    td.parentElement.classList.add('xrow');
    tbl.querySelectorAll('tr').forEach(tr => {
      const c = tr.cells[td.cellIndex];
      if (c) c.classList.add('xcol');
    });
    td.classList.add('xsel');
  });
}
function clearRange() {
  document.querySelectorAll('.xrange').forEach(c => c.classList.remove('xrange'));
}

function attachTableXY(containerId) {
  const root = document.getElementById(containerId);
  let hovTbl = null, hovCol = -1;

  function clearHov() {
    if (hovTbl) hovTbl.querySelectorAll('.colhov').forEach(c => c.classList.remove('colhov'));
    hovTbl = null; hovCol = -1;
  }
  root.addEventListener('mouseover', e => {
    const cell = e.target.closest('td, th');
    if (!cell || !root.contains(cell)) return;
    const tbl = cell.closest('table');
    const ci = cell.cellIndex;
    if (tbl === hovTbl && ci === hovCol) return;
    clearHov();
    if (ci > 0) {
      tbl.querySelectorAll('tr').forEach(tr => {
        const c = tr.cells[ci];
        if (c) c.classList.add('colhov');
      });
      hovTbl = tbl; hovCol = ci;
    }
  });
  root.addEventListener('mouseleave', clearHov);

  // Shift+클릭 시 브라우저 텍스트 선택 방지
  root.addEventListener('mousedown', e => { if (e.shiftKey) e.preventDefault(); });

  root.addEventListener('click', e => {
    if (e.target.closest('.rowbtn')) return;         // 숨기기/강조 버튼과 충돌 방지
    const td = e.target.closest('td');
    if (!td || !root.contains(td) || td.cellIndex === 0) return;
    const tbl = td.closest('table');

    // Shift+클릭: 마지막 클릭 셀(앵커) ~ 현재 셀 직사각형 범위 강조 (같은 표에서만)
    if (e.shiftKey && xySel.anchor && xySel.anchor.isConnected
        && xySel.anchor.closest('table') === tbl) {
      clearRange();
      const rows = [...tbl.rows];
      const r1 = xySel.anchor.parentElement.rowIndex, r2 = td.parentElement.rowIndex;
      const c1 = xySel.anchor.cellIndex, c2 = td.cellIndex;
      for (let r = Math.min(r1, r2); r <= Math.max(r1, r2); r++) {
        for (let c = Math.max(1, Math.min(c1, c2)); c <= Math.max(c1, c2); c++) {
          const cell = rows[r] && rows[r].cells[c];
          if (cell) cell.classList.add('xrange');
        }
      }
      return;
    }

    // Ctrl(⌘)+클릭: 십자 추가/제거
    if (e.ctrlKey || e.metaKey) {
      xySel.cells.has(td) ? xySel.cells.delete(td) : xySel.cells.add(td);
      xySel.anchor = td;
      applyXY();
      return;
    }

    // 일반 클릭: 단일 십자 (같은 셀 재클릭 시 해제)
    const wasOnly = xySel.cells.has(td) && xySel.cells.size === 1;
    xySel.cells.clear();
    clearRange();
    if (!wasOnly) { xySel.cells.add(td); xySel.anchor = td; }
    applyXY();
  });
}
['tableWrap', 'multiWrap', 'comboWrap'].forEach(attachTableXY);

// 표 좌우 스크롤 (◀ ▶: 보이는 폭의 절반씩, 표 여러 개면 동시에)
function scrollTables(dir) {
  const els = [];
  if (view === 'table') els.push(document.getElementById('tableWrap'));
  if (view === 'multi') els.push(...document.querySelectorAll('#multiWrap .tscroll'));
  if (view === 'combo') els.push(...document.querySelectorAll('#comboWrap .tscroll'));
  els.forEach(el => el.scrollBy({ left: dir * el.clientWidth / 2, behavior: 'smooth' }));
}
document.getElementById('scrollL').onclick = () => scrollTables(-1);
document.getElementById('scrollR').onclick = () => scrollTables(1);

document.getElementById('restoreBtn').onclick = () => {
  hiddenRows = new Set();
  saveRowPrefs();
  refresh();
};
document.getElementById('startSel').onchange = e => {
  startD = e.target.value;
  if (endD < startD) { endD = startD; document.getElementById('endSel').value = endD; }
  refresh();
};
document.getElementById('endSel').onchange = e => {
  endD = e.target.value;
  if (endD < startD) { startD = endD; document.getElementById('startSel').value = startD; }
  refresh();
};

(async () => {
  try {
    catalog = await loadCatalog();
    const nav = document.getElementById('nav');
    let comboInserted = false;
    catalog.forEach(item => {
      if (APT_COMBO.ids.includes(item.id)) {
        // 부동산 3개 지표는 종합 메뉴 하나로 묶어서 표시
        if (!comboInserted) {
          const btn = document.createElement('button');
          btn.id = 'aptComboBtn';
          btn.textContent = APT_COMBO.name;
          btn.onclick = enterCombo;
          nav.appendChild(btn);
          comboInserted = true;
        }
        return;
      }
      const btn = document.createElement('button');
      btn.textContent = item.name;
      btn.dataset.id = item.id;
      btn.onclick = () => select(item.id);
      nav.appendChild(btn);
    });
    // 지표 비교 메뉴 (구분선 + 버튼)
    const hr = document.createElement('div');
    hr.style.cssText = 'border-top:1px solid #e0e4ea;margin:10px 0';
    nav.appendChild(hr);
    const cmpBtn = document.createElement('button');
    cmpBtn.id = 'compareNavBtn';
    cmpBtn.textContent = '📊 지표 비교';
    cmpBtn.onclick = enterCompare;
    nav.appendChild(cmpBtn);
    document.getElementById('exportBtn').onclick = exportExcel;
    if (catalog.length) select(catalog[0].id);
    else document.getElementById('title').textContent = '지표가 없습니다. fetch.py를 먼저 실행하세요.';
  } catch (e) {
    document.getElementById('title').textContent = '데이터 로드 실패: ' + e.message;
  }
})();
</script>
