# ─────────────────────────────────────────────────────────────
# 지표 정의 파일
# 여기에 지표를 추가하면 fetch.py가 자동으로 수집해서
# docs/data/<id>.json 으로 저장합니다. 코드 수정 불필요.
#
# freq: Q(분기), M(월)
# lookback_years: 오늘 기준 최근 N년치 수집
# params: KOSIS 파라미터 (orgId, tblId, itmId, objL1 ...)
#   * KOSIS 통계표에서 "OpenAPI" 버튼 → URL 생성기로 값 확인 가능
# ─────────────────────────────────────────────────────────────
indicators:
  - id: kr_gdp_real
    name: 실질 국내총생산 (계절조정, 분기)
    source: kosis
    unit: 십억원
    freq: Q
    start_year: 2000     # 첫 실행: 2000년부터 전체 아카이브
    refetch_years: 2     # 이후 실행: 최근 2년만 다시 받아 병합 (개정 반영)
    series_first: ["국내총생산에 대한 지출"]
    params:
      orgId: "301"
      tblId: "DT_200Y108"
      itmId: "13103136297999 "
      objL1: "ALL"

  - id: kr_gdp_nominal
    name: 명목 국내총생산 (계절조정, 분기)
    source: kosis
    unit: 십억원
    freq: Q
    start_year: 2000
    refetch_years: 2
    series_first: ["국내총생산에 대한 지출"]
    params:
      orgId: "301"
      tblId: "DT_200Y107"
      itmId: "13103136276999 "
      objL1: "ALL"

  # 연간 GDP: 분기 아카이브를 연도별 합산해 자동 생성 (API 호출 없음)
  - id: kr_gdp_real_annual
    name: 실질 국내총생산 (연간)
    source: derived
    unit: 십억원
    freq: A
    params:
      from: kr_gdp_real
      method: annual_sum

  - id: kr_gdp_nominal_annual
    name: 명목 국내총생산 (연간)
    source: derived
    unit: 십억원
    freq: A
    params:
      from: kr_gdp_nominal
      method: annual_sum

  # 품목성질별 (총지수·상품·서비스 계층) — KR_Macro CPI 시트와 동일 구성
  - id: kr_cpi
    name: 소비자물가지수 (품목성질별)
    source: kosis
    unit: 지수
    freq: M
    start_year: 2010
    refetch_years: 2
    series_first: ["총지수"]
    params:
      orgId: "101"
      tblId: "DT_1J22002"
      itmId: "T "
      objL1: "T10 "
      objL2: "00 21 211 212 213 22 221 222 223 "

  # 식료품·에너지 제외(근원) 등
  - id: kr_cpi_core
    name: 소비자물가지수 (식료품·에너지)
    source: kosis
    unit: 지수
    freq: M
    start_year: 2010
    refetch_years: 2
    params:
      orgId: "101"
      tblId: "DT_1J22009"
      itmId: "T "
      objL1: "ALL"

  # 품목별 상세 지수 (458개 품목 — 구성 품목 탭에서 사용)
  - id: kr_cpi_items
    name: 소비자물가지수 (품목별 상세)
    source: kosis
    unit: 지수
    freq: M
    start_year: 2015
    refetch_years: 2
    params:
      orgId: "101"
      tblId: "DT_1J22112"
      itmId: "T "
      objL1: "T10 "
      objL2: "ALL"

  # 생활물가지수 (체감물가 — 자주 사는 품목 위주)
  - id: kr_cpi_living
    name: 생활물가지수
    source: kosis
    unit: 지수
    freq: M
    start_year: 2010
    refetch_years: 2
    params:
      orgId: "101"
      tblId: "DT_1J22005"
      itmId: "T "
      objL1: "T10 "
      objL2: "ALL"

  # ── 소매판매액지수 (통계청) ──────────────────────────────────
  - id: kr_retail
    name: 소매판매액지수 (상품군별)
    source: kosis
    unit: 지수(2020=100)
    freq: M
    start_year: 2010
    refetch_years: 2
    series_first: ["소매판매액지수", "총지수"]
    params:
      orgId: "101"
      tblId: "DT_1K41012"
      itmId: "T1 "
      objL1: "ALL"

  - id: kr_retail_type
    name: 소매판매액지수 (업태별)
    source: kosis
    unit: 지수(2020=100)
    freq: M
    start_year: 2010
    refetch_years: 2
    params:
      orgId: "101"
      tblId: "DT_1K41013"
      itmId: "T1 "
      objL1: "ALL"

  # ── 부동산원 R-ONE (주간 아파트 지수, 전국·수도권·서울·서울권역) ──
  # cls_ids 를 생략하면 통계표의 모든 지역(전국·수도권·서울권역·경기 시별·
  # 인천·지방·세종·5대광역시·8개도 등)을 한 번에 수집한다.
  - id: kr_apt_sale_idx
    name: 아파트 매매가격지수 (주간)
    source: reb
    unit: 지수
    freq: W
    start_year: 2015
    refetch_years: 1
    params:
      statbl_id: "T244183132827305"
      itm_id: "10001"

  - id: kr_apt_jeonse_idx
    name: 아파트 전세가격지수 (주간)
    source: reb
    unit: 지수
    freq: W
    start_year: 2015
    refetch_years: 1
    params:
      statbl_id: "T247713133046872"
      itm_id: "10001"

  - id: kr_apt_sale_demand
    name: 아파트 매매수급동향 (주간)
    source: reb
    unit: 지수
    freq: W
    start_year: 2015
    refetch_years: 1
    params:
      statbl_id: "T248163133074619"
      itm_id: "10001"

  # ── ECOS (한국은행) ──────────────────────────────────────────
  - id: kr_household_credit
    name: 가계신용 (용도별, 분기)
    source: ecos
    unit: 십억원
    freq: Q
    lookback_years: 15
    params:
      stat_code: "151Y004"

  - id: kr_bop
    name: 국제수지 (BPM6, 월)
    source: ecos
    unit: 백만달러
    freq: M
    lookback_years: 10
    params:
      stat_code: "301Y013"

  - id: kr_csi
    name: 소비자심리지수·기대인플레이션
    source: ecos
    unit: 지수·%
    freq: M
    lookback_years: 10
    params:
      stat_code: "511Y002"
      item_codes: ["FME"]

  - id: kr_infl_expect
    name: 기대인플레이션율
    source: ecos
    unit: '%'
    freq: M
    lookback_years: 10
    params:
      stat_code: "511Y003"
      item_codes: ["FMB", "FMC", "FMD"]

  - id: kr_base_rate
    name: 한국은행 기준금리
    source: ecos
    unit: '%'
    freq: M
    lookback_years: 20
    params:
      stat_code: "722Y001"
      item_codes: ["0101000"]
